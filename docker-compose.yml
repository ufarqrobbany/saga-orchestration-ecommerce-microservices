version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: saga_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - saga_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: saga_api_gateway
    ports:
      - "3000:3000"
    environment:
      ORCHESTRATOR_URL: http://orchestrator-service:3001
    depends_on:
      - orchestrator-service
    networks:
      - saga_network

  orchestrator-service:
    build:
      context: ./orchestrator-service
      dockerfile: Dockerfile
    container_name: saga_orchestrator
    ports:
      - "3001:3001"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: orchestrator_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - saga_network

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: saga_order_service
    ports:
      - "3002:3002"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      ORDER_DB_NAME: order_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - saga_network

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: saga_inventory_service
    ports:
      - "3003:3003"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      INVENTORY_DB_NAME: inventory_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - saga_network

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: saga_payment_service
    ports:
      - "3004:3004"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      PAYMENT_DB_NAME: payment_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - saga_network

  shipping-service:
    build:
      context: ./shipping-service
      dockerfile: Dockerfile
    container_name: saga_shipping_service
    ports:
      - "3005:3005"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      SHIPPING_DB_NAME: shipping_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - saga_network

volumes:
  postgres_data:

networks:
  saga_network:
    driver: bridge
